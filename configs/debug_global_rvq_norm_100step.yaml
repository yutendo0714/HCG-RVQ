run_name: debug_global_rvq_norm_100step
seed: 1234
output_dir: experiments
model:
  N: 192
  M: 320
quantizer:
  type: global_rvq
  group_size: 32
  num_stages: 2
  codebook_size: 256
  use_global_norm: true
  codebook_init_scale: 0.1
entropy_index:
  enabled: false
stage_gate:
  enabled: false
loss:
  lambda_rd: 0.0035
  beta_commit: 0.25
  rho_gate: 0.0
data:
  train_roots:
  - /dpl/openimages/open-images-v6/train/data
  patch_size: 256
  batch_size: 8
  num_workers: 4
  max_train_images: 1024
eval:
  root: /dpl/kodak
  num_workers: 2
train:
  epochs: 10
  lr: 0.0001
  aux_lr: 0.001
  log_interval: 10
  clip_max_norm: 1.0
  lr_milestones: []
  lr_gamma: 0.1
  save_interval_steps: 100
  max_steps: 100
wandb:
  enabled: true
  project: HCG-RVQ
  name: debug_global_rvq_norm_100step
  mode: online
