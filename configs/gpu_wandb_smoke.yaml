run_name: gpu_wandb_smoke
seed: 1234
output_dir: experiments
model:
  N: 64
  M: 96
quantizer:
  type: hcs_rvq
  group_size: 24
  num_stages: 1
  codebook_size: 64
hyper_conditioning:
  scale_min: 0.05
  scale_max: 10.0
entropy_index:
  enabled: true
  hidden_channels: 64
stage_gate:
  enabled: false
loss:
  lambda_rd: 0.0035
  beta_commit: 0.25
  rho_gate: 0.0
data:
  train_roots:
  - /dpl/kodak
  patch_size: 128
  batch_size: 2
  num_workers: 0
  max_train_images: 10
eval:
  root: /dpl/kodak
  max_images: 2
  num_workers: 0
train:
  epochs: 2
  lr: 0.0001
  aux_lr: 0.001
  log_interval: 1
  clip_max_norm: 1.0
  max_steps: 5
  save_interval_steps: 5
  lr_milestones: []
wandb:
  enabled: true
  project: HCG-RVQ
  name: gpu_wandb_smoke
  mode: online
